services:
  mysql:
    image: mysql:8.0
    container_name: tierlist-mysql-dev
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-tierlist}
      MYSQL_USER: ${MYSQL_USER:-tierlist}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-tierlistpassword}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tierlist-network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: tierlist-phpmyadmin
    environment:
      PMA_HOST: ${MYSQL_HOST:-mysql}
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
    ports:
      - "8080:80"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - tierlist-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: tierlist-backend
    user: root
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-tierlist}:${MYSQL_PASSWORD:-tierlistpassword}@mysql:3306/${MYSQL_DATABASE:-tierlist}
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - ./images:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - tierlist-network
    stdin_open: true
    tty: true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: tierlist-frontend
    env_file:
      - .env
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - ./.env:/.env:ro
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - tierlist-network
    stdin_open: true
    tty: true

volumes:
  mysql_data:
  frontend_node_modules:

networks:
  tierlist-network:
    driver: bridge
